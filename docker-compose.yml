version: '3.9'
services:
    frontend:
        image: node:24-alpine
        working_dir: /app
        command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
        ports:
            - '5173:5173'
        env_file:
            - .env.example
        environment:
            VITE_SCHEMA_SYNC_API_BASE_URL: http://localhost:4010
            VITE_SCHEMA_SYNC_API_PROXY_TARGET: http://backend:4010
        volumes:
            - ./:/app
        depends_on:
            backend:
                condition: service_started
    backend:
        build:
            context: .
            dockerfile: Dockerfile.backend
        ports:
            - '4010:4010'
        env_file:
            - .env.example
        environment:
            CHARTDB_CORS_ORIGIN: http://localhost:5173
            CHARTDB_SECRET_KEY: local-dev-only-change-me
            PORT: 4010
            HOST: 0.0.0.0
        volumes:
            - ./.chartdb-data:/app/.chartdb-data
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://127.0.0.1:4010/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
    postgres:
        image: postgres:16-alpine
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: chartdb
            POSTGRES_USER: chartdb
            POSTGRES_PASSWORD: chartdb
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U chartdb -d chartdb']
            interval: 5s
            timeout: 5s
            retries: 10
        volumes:
            - postgres-data:/var/lib/postgresql/data
volumes:
    postgres-data:
