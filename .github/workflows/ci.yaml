name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    env:
      CHARTDB_SECRET_KEY: ci-chartdb-secret-key-please-rotate-in-real-deployments
      CHARTDB_POSTGRES_PASSWORD: ci-chartdb-postgres-password
      CHARTDB_CORS_ORIGIN: http://localhost:8080
      CHARTDB_LOG_LEVEL: warn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build self-hosted containers
        run: docker compose build

      - name: Start self-hosted stack
        run: docker compose up -d

      - name: Wait for web container health
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          exit 1

      - name: Wait for API readiness
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4010/api/readyz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Stop self-hosted stack
        if: always()
        run: docker compose down -v
